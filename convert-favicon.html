<!DOCTYPE html>
<html>
<head>
    <title>Favicon Converter</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; }
        .size-group { text-align: center; }
    </style>
</head>
<body>
    <h1>SpendWise Favicon Generator</h1>
    <p>This will generate different sizes of the favicon from the SVG.</p>
    
    <div class="container">
        <div class="size-group">
            <h3>16x16</h3>
            <canvas id="canvas16" width="16" height="16"></canvas>
            <br><button onclick="downloadCanvas('canvas16', '16')">Download 16x16</button>
        </div>
        
        <div class="size-group">
            <h3>32x32</h3>
            <canvas id="canvas32" width="32" height="32"></canvas>
            <br><button onclick="downloadCanvas('canvas32', '32')">Download 32x32</button>
        </div>
        
        <div class="size-group">
            <h3>48x48</h3>
            <canvas id="canvas48" width="48" height="48"></canvas>
            <br><button onclick="downloadCanvas('canvas48', '48')">Download 48x48</button>
        </div>
    </div>

    <script>
        const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
            <defs>
                <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
                </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="14" fill="url(#faviconGradient)" opacity="0.2"/>
            <text x="16" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="url(#faviconGradient)">$</text>
        </svg>`;

        function drawToCanvas(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            const blob = new Blob([svgContent], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            
            img.onload = function() {
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(img, 0, 0, size, size);
                URL.revokeObjectURL(url);
            };
            
            img.src = url;
        }

        function downloadCanvas(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = `favicon-${size}x${size}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // Draw all sizes when page loads
        window.onload = function() {
            drawToCanvas('canvas16', 16);
            drawToCanvas('canvas32', 32);
            drawToCanvas('canvas48', 48);
        };
    </script>
</body>
</html>
